# USB Defense System — main configuration
# Lives at /etc/usb-defense/config.yaml on the deployed system.

# Lockdown behavior
lockdown_grace_period_sec: 0   # 0 = lockdown immediately on unauthorized USB
lockdown_screen_lock: true     # also lock the screen via loginctl
require_unlock_key: true       # only USBs with can_unlock=true clear lockdown

# Logging
daemon_log_level: INFO
audit_journald: true
audit_flat_file: true

# UX
notify_on_authorized: true     # toast notification on authorized device
auto_block_unknown: true       # main enforcement switch

# Simulator (v0.2.0)
# When true, the `simulate_event` IPC command lets tests/simulate.py drive
# lockdown enter/clear without real hardware. Even when enabled, the daemon
# now requires the admin password on every simulate_event call. Set to true
# only when you need to run the viva demos (Demos 3, 5, 6, 7, 8).
simulator_enabled: false
