Section "ServerFlags"
    # Disable Ctrl+Alt+F1..F12 VT switching. This means a user cannot
    # escape the lockdown overlay by switching to a text console. The
    # cost is that nobody on this workstation can switch TTYs ever —
    # acceptable trade-off for a defense workstation that runs only the
    # USB Defense UI.
    Option "DontVTSwitch" "True"
    # Disable Ctrl+Alt+Backspace kill-server combo as well.
    Option "DontZap" "True"
EndSection
