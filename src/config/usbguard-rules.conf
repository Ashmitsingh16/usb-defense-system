# USBGuard initial rules.
# Default policy: block everything. Our daemon authorizes whitelisted devices at runtime.
#
# Safety allow-list: hubs, and the keyboard/mouse already attached at the moment
# USBGuard starts — without these the user (or VM) is locked out at the first
# reboot. The "hardwired" connect-type matches devices that are physically/
# virtually fixed to the system (e.g. internal hubs, VirtualBox emulated HID).
# Strip these rules for a hardened production deployment where the operator
# enrolls every device manually before first boot.

# Allow USB hubs (otherwise nothing downstream can enumerate)
allow with-interface 09:00:00

# Allow HID keyboards and mice that are HARDWIRED (present when USBGuard
# started) — keeps boot-time keyboards/mice working without auto-trusting
# anything a user later plugs in. A Rubber Ducky / BadUSB plugged in after
# boot does NOT match `with-connect-type "hardwired"` and is therefore
# blocked until the whitelist daemon explicitly authorizes it.
allow with-interface 03:01:01 with-connect-type "hardwired"
allow with-interface 03:00:01 with-connect-type "hardwired"
allow with-interface 03:01:02 with-connect-type "hardwired"
allow with-interface 03:00:02 with-connect-type "hardwired"

# Block everything else by default
block
