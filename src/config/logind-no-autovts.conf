# systemd-logind drop-in installed by USB Defense System (v0.3.0+).
#
# Tells logind never to auto-allocate extra virtual terminals on demand.
# Combined with masking autovt@tty1..6 (handled by install.sh), this
# means a user who lands at a text console will not be presented with a
# fresh login prompt — closing the TTY-1 escape gap documented in the
# v0.2 README.
#
# Removing this file and unmasking the autovt units restores stock
# Rocky / RHEL behaviour; the uninstaller does both.

[Login]
NAutoVTs=0
ReserveVT=0
